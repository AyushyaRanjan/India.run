  platform: "Lenovo LOQ essential-i5-12thgen"                 # e.g. "MacBook Pro M2" or "Dell XPS 15 i7"
  cpu_cores: "12"               # e.g. 8
  ram_gb: 16
  python_version: "3.11"
  os: "Ubuntu-22"                       # e.g. "macOS 14.5" or "Ubuntu 22.04 LTS"
