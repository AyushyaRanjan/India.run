# ============================================================================
# AI tools declaration
# ============================================================================
# Honest declaration — permitted and not penalised.
# Contradictions between this and your code or interview are penalised.

ai_tools_used:
  - "Claude"
  - "Gemini"

ai_usage_summary: |
  Claude (claude.ai) was used for architecture design discussion, scoring
  formula refinement, and generating initial drafts of each module. Gemini
  was used for during development. All module code was
  written, reviewed, tested, and adapted by the team. No candidate data was
  fed to any external LLM. rank.py makes zero network calls — all scoring
  uses precomputed artifacts and pure Python/numpy logic.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Two-phase pipeline. Phase 1 (precompute.py, no time limit): streams all
  100K candidates, extracts four feature scores per candidate (skills match,
  experience and company background, behavioral availability, location),
  builds a BM25 index over concatenated career text, runs 7-rule honeypot
  detection, saves compact artifacts to disk (~230MB total). Phase 2
  (rank.py, under 5 min): loads artifacts, computes final scores as
  vectorized numpy operations in under 1 second, generates template-based
  reasoning using only real profile facts, writes submission CSV. Scoring:
  final = (0.50 x jd_match + 0.35 x experience + 0.15 x location) x
  (0.40 + 0.60 x behavioral) x honeypot_penalty. Honeypot detection knocks
  out candidates with impossible timelines, title-description mismatches,
  or implausible skill durations. No LLM is called during ranking.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true    
